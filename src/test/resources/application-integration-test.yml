# ===========================================
# 통합 테스트 전용 설정
# ===========================================

# ===========================================
# Spring Framework 설정
# ===========================================
spring:
  # 프로필 설정
  profiles:
    active: integration-test
  
  # H2 메모리 데이터베이스 설정 (통합 테스트용)
  datasource:
    url: jdbc:h2:mem:integration-testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  
  # JPA 설정 (데이터 유지)
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true   # 통합 테스트에서는 SQL 로그 활성화
        show_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.H2Dialect
    
  # 스케줄링 활성화 (통합 테스트용)
  task:
    scheduling:
      enabled: true

  # 파일 업로드 설정
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ===========================================
# 보안 & 인증 설정
# ===========================================
jwt:
  secret: integration-test-jwt-secret-key-for-testing-purposes-only-not-for-production-minimum-32-chars
  expiration: 3600000  # 1시간 (통합 테스트용으로 길게)

# OAuth2 활성화 (통합 테스트에서 테스트)
oauth2:
  enabled: true

# ===========================================
# 외부 서비스 설정
# ===========================================
# AWS S3 Mock 설정
cloud:
  aws:
    s3:
      bucket: integration-test-bucket
    credentials:
      access-key: integration-test-access-key
      secret-key: integration-test-secret-key
    region:
      static: ap-northeast-2

# 뉴스 API 설정 (Mock)
news:
  serpapi:
    api-key: integration-test-api-key
    enabled: true
  scheduler:
    enabled: false  # 스케줄러는 비활성화

# ===========================================
# 애플리케이션 설정
# ===========================================
app:
  init:
    enabled: true  # 통합 테스트에서는 데이터 초기화 활성화

# ===========================================
# 로깅 설정 (상세)
# ===========================================
logging:
  level:
    com.autocoin: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.test: INFO
    
# API 로깅 활성화
autocoin:
  logging:
    api-filter:
      enabled: true

# ===========================================
# CORS 설정
# ===========================================
cors:
  allowed-origins: http://localhost:3000,http://localhost:3001
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: Authorization,Content-Type,X-Requested-With
  max-age: 3600
