# 간단한 테스트 전용 설정
spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  task:
    scheduling:
      enabled: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# AWS S3 테스트 설정 (Mock용)
cloud:
  aws:
    s3:
      bucket: test-bucket
    region:
      static: us-east-1
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
    stack:
      auto: false

# JWT 테스트 설정
jwt:
  secret: test-jwt-secret-key-for-testing-purposes-only-not-for-production-environment-minimum-32-characters
  expiration: 1800000
  refresh-expiration: 86400000

# 외부 서비스 비활성화
sentry:
  enabled: false
  debug: false
oauth2:
  enabled: false
app:
  init:
    enabled: false
news:
  scheduler:
    enabled: false
slack:
  notifications:
    enabled: false

# 로깅 최소화
logging:
  level:
    root: WARN
    com.autocoin: INFO

# 관리 엔드포인트 비활성화
management:
  endpoints:
    web:
      exposure:
        include: health
