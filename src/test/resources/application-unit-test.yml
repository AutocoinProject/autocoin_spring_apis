# ===========================================
# 단위 테스트 전용 설정
# ===========================================

# ===========================================
# Spring Framework 설정
# ===========================================
spring:
  # 프로필 설정
  profiles:
    active: unit-test
  
  # 데이터베이스 비활성화 (단위 테스트용)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
  
  # Mock 설정
  main:
    allow-bean-definition-overriding: true
  
  # 스케줄링 비활성화
  task:
    scheduling:
      enabled: false

# ===========================================
# 보안 & 인증 설정 (Mock)
# ===========================================
jwt:
  secret: unit-test-jwt-secret-key-for-testing-purposes-only-not-for-production-environment-minimum-32-characters
  expiration: 1800000  # 30분

oauth2:
  enabled: false

# ===========================================
# 외부 서비스 비활성화
# ===========================================
sentry:
  dsn: ""

news:
  serpapi:
    enabled: false
  scheduler:
    enabled: false

app:
  init:
    enabled: false

# ===========================================
# 로깅 설정 (최소)
# ===========================================
logging:
  level:
    com.autocoin: INFO
    org.springframework.test: WARN
    org.springframework.boot.test: WARN
    org.springframework.security: WARN
    org.mockito: WARN
    
autocoin:
  logging:
    api-filter:
      enabled: false

# ===========================================
# CORS 설정 (기본)
# ===========================================
cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type
  max-age: 3600
